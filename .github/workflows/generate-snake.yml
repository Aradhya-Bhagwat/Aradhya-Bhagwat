name: Generate Snake Animation

on:
  schedule:
    # Runs every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake-nature.svg?color_snake=#2d6a4f&color_outlines=#e9ecef&color_dots=#ebedf0,#b7e4c7,#74c69d,#40916c,#1b4332

      - name: Generate github-readme-streak-stats.svg
        uses: DenverCoder1/github-readme-streak-stats@v1.6.0
        with:
          options: "user=${{ github.repository_owner }}&background=00000000&fire=2e7d32&ring=4ade80&currStreakLabel=4ade80&currStreakNum=2e7d32&sideNums=2e7d32&sideLabels=4ade80&border=00000000"
          path: dist/github-readme-streak-stats.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push assets to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
